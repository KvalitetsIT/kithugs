version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Wait 14 days before updating to help circumvent supply chain attacks
    cooldown:
      default-days: 14

  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Wait 14 days before updating to help circumvent supply chain attacks
    cooldown:
      default-days: 14
